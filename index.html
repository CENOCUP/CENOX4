<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA MASTER - Finalização de Temporada</title>
    <style>
        :root { --bg: #050505; --card: #111; --neon: #00ff87; --danger: #ff4444; --text: #fff; --dim: #888; --gold: #ffd700; --blue: #00d4ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1200px; }
        
        /* DASHBOARD */
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .dash-card { padding: 20px; border-radius: 15px; border-left: 5px solid; background: #1a1a1a; }
        .dash-lider { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,135,0.1); }
        .dash-lanterna { border-color: var(--danger); box-shadow: 0 0 15px rgba(255,68,68,0.1); }
        .dash-label { font-size: 0.7rem; text-transform: uppercase; color: var(--dim); }
        .dash-name { font-size: 1.6rem; font-weight: 900; margin: 5px 0; }

        /* ADMIN */
        .admin-box { background: #161616; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        .btn { padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; border: none; text-transform: uppercase; margin-right: 5px; }
        .btn-blue { background: #0066ff; color: white; }
        .btn-orange { background: #ff9900; color: white; }
        .btn-green { background: var(--neon); color: #000; width: 100%; margin-top: 15px; height: 45px; }
        .btn-archive { background: #400; color: #f66; width: 100%; margin-top: 10px; padding: 8px; font-size: 0.7rem; }
        
        .row-edit { display: grid; grid-template-columns: 2fr repeat(5, 1fr) 40px; gap: 5px; margin-bottom: 5px; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 5px; text-align: center; width: 100%; }

        /* TABELA */
        .table-wrap { background: var(--card); border-radius: 12px; padding: 15px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; color: var(--dim); font-size: 0.7rem; padding: 12px; border-bottom: 2px solid #222; }
        td { padding: 12px; border-bottom: 1px solid #1a1a1a; }
        .col-pts { color: var(--neon); font-weight: 900; font-size: 1.1rem; text-align: center; background: rgba(0,255,135,0.05); }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center; margin-bottom:30px;">
        <h1>FIFA <span style="color:var(--neon)">MASTER</span></h1>
        <p style="color:var(--dim); font-size:0.8rem;">SISTEMA DE PONTOS CORRIDOS & BACKUP</p>
    </header>

    <div class="dash-grid" id="dashStats">
        <div class="dash-card dash-lider">
            <div class="dash-label">👑 Líder da Época</div>
            <div id="lider-nome" class="dash-name">---</div>
            <div id="lider-info" style="color:var(--neon); font-weight:bold;">0 PTS</div>
        </div>
        <div class="dash-card dash-lanterna">
            <div class="dash-label">📉 Lanterna (Último)</div>
            <div id="lanterna-nome" class="dash-name">---</div>
            <div id="lanterna-info" style="color:var(--danger); font-weight:bold;">0 PTS</div>
        </div>
    </div>

    <div class="admin-box">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
            <h3 style="margin:0; font-size:0.9rem; color:var(--blue)">PAINEL DE CONTROLO</h3>
            <div>
                <button class="btn btn-blue" onclick="exportar()">📥 Backup para PC</button>
                <button class="btn btn-orange" onclick="importar()">📤 Restaurar de PC</button>
            </div>
        </div>
        <div id="editor"></div>
        <button onclick="addPlayer()" style="background:none; border:1px dashed #444; color:#666; width:100%; padding:10px; margin-top:10px; cursor:pointer;">+ ADICIONAR JOGADOR</button>
        <button class="btn btn-green" onclick="salvar()">💾 GUARDAR DADOS DA TABELA</button>
        
        <button class="btn btn-archive" onclick="encerrarTemporada()">🔒 FINALIZAR ÉPOCA ATUAL E ARQUIVAR</button>
    </div>

    <div class="table-wrap">
        <div style="padding:10px;">
            <select id="viewSelect" onchange="mudarView(this.value)" style="background:#000; color:var(--neon); border:1px solid var(--neon); padding:8px; border-radius:5px;">
                <option value="atual">Época Atual</option>
                <option value="geral">Ranking Geral (Pontos Acumulados)</option>
            </select>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Jogador</th>
                    <th style="text-align:center">PTS</th>
                    <th>J</th>
                    <th>V/E/D</th>
                    <th>GP/GC</th>
                    <th>SG</th>
                    <th>Aprov.</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script>
    const KEY = 'fifa_final_system_v10';
    let db = JSON.parse(localStorage.getItem(KEY)) || { atual: [], historico: [] };
    let modo = 'atual';

    function mudarView(v) { modo = v; render(); }

    function render() {
        const tbody = document.getElementById("tbody");
        const select = document.getElementById("viewSelect");
        
        // Limpar opções antigas de histórico para não duplicar
        while(select.options.length > 2) select.remove(2);
        db.historico.forEach((t, i) => {
            let opt = document.createElement('option');
            opt.value = i; opt.text = `Época: ${t.nome}`;
            if(modo == i) opt.selected = true;
            select.add(opt);
        });

        let lista = (modo === 'atual') ? [...db.atual] : (modo === 'geral' ? processarGeral() : [...db.historico[modo].dados]);

        // Ordenação sempre por Pontos (Critério Principal)
        lista.sort((a,b) => {
            let ptsA = (a.v*3)+a.e, ptsB = (b.v*3)+b.e;
            return ptsB - ptsA || b.v - a.v || (b.gp-b.gc) - (a.gp-a.gc);
        });

        // Dashboard
        if(lista.length > 0) {
            document.getElementById('lider-nome').innerText = lista[0].nome;
            document.getElementById('lider-info').innerText = `${(lista[0].v*3)+lista[0].e} Pontos`;
            document.getElementById('lanterna-nome').innerText = lista[lista.length-1].nome;
            document.getElementById('lanterna-info').innerText = `${(lista[lista.length-1].v*3)+lista[lista.length-1].e} Pontos`;
        }

        tbody.innerHTML = lista.map((j, i) => {
            let pts = (j.v*3)+j.e; let jogos = j.v+j.e+j.d;
            return `<tr>
                <td style="color:${i===0?'var(--neon)':(i===lista.length-1?'var(--danger)':'#fff')}">${i+1}º</td>
                <td><b>${j.nome}</b></td>
                <td class="col-pts">${pts}</td>
                <td>${jogos}</td>
                <td>${j.v}/${j.e}/${j.d}</td>
                <td>${j.gp}/${j.gc}</td>
                <td style="color:${(j.gp-j.gc)>=0?'var(--blue)':'var(--danger)'}"><b>${j.gp-j.gc}</b></td>
                <td style="color:#666">${jogos > 0 ? ((pts/(jogos*3))*100).toFixed(1) : 0}%</td>
            </tr>`;
        }).join('');
        renderEditor();
    }

    function renderEditor() {
        document.getElementById('editor').innerHTML = db.atual.map((j,i) => `
            <div class="row-edit">
                <input type="text" value="${j.nome}" onchange="db.atual[${i}].nome=this.value">
                <input type="number" value="${j.v}" onchange="db.atual[${i}].v=parseInt(this.value)">
                <input type="number" value="${j.e}" onchange="db.atual[${i}].e=parseInt(this.value)">
                <input type="number" value="${j.d}" onchange="db.atual[${i}].d=parseInt(this.value)">
                <input type="number" value="${j.gp}" onchange="db.atual[${i}].gp=parseInt(this.value)">
                <input type="number" value="${j.gc}" onchange="db.atual[${i}].gc=parseInt(this.value)">
                <button onclick="db.atual.splice(${i},1); salvar();" style="color:red; background:none; border:none; cursor:pointer">✖</button>
            </div>
        `).join('');
    }

    function processarGeral() {
        let res = {};
        [...db.historico, { dados: db.atual }].forEach(temp => {
            temp.dados.forEach(j => {
                if(!res[j.nome]) res[j.nome] = {nome:j.nome, v:0, e:0, d:0, gp:0, gc:0};
                res[j.nome].v += j.v; res[j.nome].e += j.e; res[j.nome].d += j.d;
                res[j.nome].gp += j.gp; res[j.nome].gc += j.gc;
            });
        });
        return Object.values(res);
    }

    // FUNÇÃO QUE ESTAVA FALTANDO
    function encerrarTemporada() {
        if(db.atual.length === 0) return alert("Não há dados para arquivar!");
        let nome = prompt("Dê um nome a esta época (ex: Março 2024):");
        if(nome) {
            db.historico.push({ nome: nome, dados: JSON.parse(JSON.stringify(db.atual)) });
            // Zera as estatísticas mas mantém os nomes dos jogadores para a próxima época
            db.atual = db.atual.map(j => ({ ...j, v:0, e:0, d:0, gp:0, gc:0 }));
            salvar();
            alert("Época arquivada com sucesso! A tabela atual foi resetada.");
        }
    }

    function addPlayer() { db.atual.push({nome:"Jogador", v:0, e:0, d:0, gp:0, gc:0}); renderEditor(); }
    function salvar() { localStorage.setItem(KEY, JSON.stringify(db)); render(); }
    
    function exportar() {
        const blob = new Blob([localStorage.getItem(KEY)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'backup_fifa.json'; a.click();
    }

    function importar() {
        const input = document.createElement('input'); input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.readAsText(e.target.files[0]);
            reader.onload = ev => { localStorage.setItem(KEY, ev.target.result); location.reload(); };
        };
        input.click();
    }

    render();
</script>
</body>
</html>
